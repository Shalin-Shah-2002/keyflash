name: Build and Release

on:
  push:
    branches: ["main"]
    tags:
      - "v*.*.*"
  pull_request:
    branches: ["main"]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build keyflash.dmg
    runs-on: macos-15
    permissions:
      contents: write
      attestations: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Show Swift version
        run: swift --version

      - name: Build app bundle
        run: |
          chmod +x Scripts/build-app.sh
          ./Scripts/build-app.sh release

      - name: Build DMG
        run: |
          chmod +x Scripts/build-dmg.sh
          ./Scripts/build-dmg.sh

      - name: Upload DMG as artifact
        uses: actions/upload-artifact@v7
        with:
          name: keyflash-dmg
          path: .build/release/keyflash.dmg
          if-no-files-found: error

      - name: Upload .app bundle (debug archive)
        uses: actions/upload-artifact@v7
        with:
          name: keyflash-app
          path: .build/release/keyflash.app
          if-no-files-found: error

      # ── Rolling release on every push to main ──
      - name: Create / Update rolling release (push to main)
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="continuous"
          SHA_SHORT="${GITHUB_SHA:0:7}"

          # Write release notes
          cat <<EOF > release-notes.md
          ## keyflash build #${{ github.run_number }} ($SHA_SHORT)

          **Continuous build** from commit [$SHA_SHORT](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}).

          This release updates on every push to \`main\`. Download \`keyflash.dmg\`, open it, and drag the app into \`/Applications\`.
          EOF

          # Delete existing release + tag if present
          gh release delete "$TAG" --repo "${{ github.repository }}" --yes 2>/dev/null || true
          git push origin --delete refs/tags/"$TAG" 2>/dev/null || true

          # Create new release
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "keyflash build #${{ github.run_number }} ($SHA_SHORT)" \
            --notes-file release-notes.md \
            --latest \
            .build/release/keyflash.dmg

      # ── Versioned release on tag push ──
      - name: Create versioned release (tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"

          cat <<EOF > release-notes.md
          ## keyflash $TAG

          ### 📦 Download
          - **keyflash.dmg** — disk image ready to mount and drag into /Applications

          ### 🔨 Build from Source
          \`\`\`bash
          git clone https://github.com/${{ github.repository }}.git
          cd keyflash
          ./Scripts/build-app.sh release
          open .build/release/keyflash.app
          \`\`\`

          ### ✅ Requirements
          - macOS 14 (Sonoma) or later
          - Mac with a keyboard backlight (MacBook Pro/Air, Magic Keyboard)
          EOF

          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "keyflash $TAG" \
            --notes-file release-notes.md \
            .build/release/keyflash.dmg
